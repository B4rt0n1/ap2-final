services:
  booking-postgres:
    image: postgres:17-alpine
    container_name: booking-postgres
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "55433:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      - NATS_URL=nats://nats:4222
      - BOOKING_GRPC_TARGET=booking-service:8080
      - USER_GRPC_TARGET=user-service:8080
      - INVENTORY_GRPC_TARGET=inventory-service:8080
    ports:
      - "8080:8080"
    depends_on:
      inventory-service:
        condition: service_started
      user-service:
        condition: service_started
      booking-service:
        condition: service_started
      nats:
        condition: service_started

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    environment:
      - DB_HOST=inventory-postgres
      - DB_PORT=5432
      - DB_USER=inventory
      - DB_PASSWORD=inventory
      - DB_NAME=inventory
      - INVENTORY_DATABASE_URL=postgres://inventory:inventory@inventory-postgres:5432/inventory?sslmode=disable
      - INVENTORY_GRPC_ADDRESS=:8080
      - NATS_URL=nats://nats:4222
      - REDIS_ADDRESS=redis:6379
    ports:
      - "50051:8080"
    depends_on:
      inventory-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    environment:
      - DB_HOST=user-postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=user
      - DB_NAME=users
      - USER_GRPC_ADDRESS=:8080
      - NATS_URL=nats://nats:4222
      - USER_DATABASE_URL=postgres://user:user@user-postgres:5432/users?sslmode=disable
    ports:
      - "50052:8080"
    depends_on:
      user-postgres:
        condition: service_healthy
      nats:
        condition: service_started

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    environment:
      - DB_HOST=booking-postgres
      - DB_PORT=5432
      - DB_USER=booking
      - DB_PASSWORD=booking
      - DB_NAME=booking
      - BOOKING_GRPC_ADDRESS=:8080
      - USER_GRPC_ADDRESS=user-service:8080
      - INVENTORY_GRPC_ADDRESS=inventory-service:8080
      - NATS_URL=nats://nats:4222
      - BOOKING_DATABASE_URL=postgres://booking:booking@booking-postgres:5432/booking?sslmode=disable
    ports:
      - "50053:8080"
    depends_on:
      booking-postgres:
        condition: service_healthy
      nats:
        condition: service_started

  user-postgres:
    image: postgres:17-alpine
    container_name: user-postgres
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "55434:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-postgres:
    image: postgres:17-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
    ports:
      - "55435:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.12-alpine
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  booking-migrate:
    image: migrate/migrate:v4.19.0
    profiles: ["tools"]
    volumes:
      - ./services/booking-service/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://booking:booking@booking-postgres:5432/booking?sslmode=disable",
        "up",
      ]
    depends_on:
      booking-postgres:
        condition: service_healthy

  user-migrate:
    image: migrate/migrate:v4.19.0
    profiles: ["tools"]
    volumes:
      - ./services/user-service/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://user:user@user-postgres:5432/users?sslmode=disable",
        "up",
      ]
    depends_on:
      user-postgres:
        condition: service_healthy

  inventory-migrate:
    image: migrate/migrate:v4.19.0
    profiles: ["tools"]
    volumes:
      - ./services/inventory-service/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://inventory:inventory@inventory-postgres:5432/inventory?sslmode=disable",
        "up",
      ]
    depends_on:
      inventory-postgres:
        condition: service_healthy

volumes:
  booking_postgres_data:
  user_postgres_data:
  inventory_postgres_data:

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test contracts
        run: go test ./...

      - name: Build booking service
        run: go build ./services/booking-service/cmd/server

      - name: Build API gateway
        run: go build ./api-gateway/cmd/server

      - name: Build inventory service
        run: go build -o inventory-service-bin ./services/inventory-service/cmd/server

      - name: Test inventory service
        run: go test ./services/inventory-service/internal/usecase/... 

  compose:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate default compose config
        run: docker compose config

      - name: Validate tools compose config
        run: docker compose --profile tools config